<VirtualHost *:80>
    ServerName exemple.com
    ServerAlias www.exemple.com

    DocumentRoot "C:/MAMP/htdocs/legalhelp2/legalhelp"

    <Directory "C:/MAMP/htdocs/legalhelp2/legalhelp">
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog "logs/legalhelp-error.log"
    CustomLog "logs/legalhelp-access.log" combined
</VirtualHost>
